<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App Using JS</title>
    <link rel="stylesheet" href="weather.css">
</head>
<body>
    <!-- <div class="card-container"> -->
        <div class="card">
            <div class="search-box">
                <input type="text" placeholder="Enter City Name" spellcheck="false" id="search-input">
                <button class="search-icon"><img src="search.png" alt=""></button>
            </div>
            <div class="error">
                invalid city name
            </div>
            <div class="prov">
                <span>please provide a city name</span>
            </div>
            <div class="weather">
                <img src="heavy-rain.png" alt="" class="weather-icon">
                <h1 class="temperature">22°c</h1>
                <h2 class="city">New york</h2>
                <div class="details">
                    <div class="col">
                        <img src="humidity.png" alt="">
                        <div>
                            <span class="humidity">50 %</span>
                            <p>Humidity</p>
                        </div>
                    </div>
                    <div class="col">
                        <img src="wind.png" alt="">
                        <div>
                            <span class="wind">15 Km/h</span>
                            <p>Wind Speed</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    <!-- </div> -->
    <script src="weather.js"></script>
</body>
</html>
